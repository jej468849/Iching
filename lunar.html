<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음력 변환 매화역수 작괘기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f5f5f5; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); }
        
        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        h1 { margin: 0; font-size: 28px; color: #333; }
        
        .home-btn{
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }
        
        .home-btn:hover{
            background: #5568d3;
        }
        
        label { display: block; margin-top: 15px; margin-bottom: 6px; font-weight: bold; color: #444; }
        input[type="date"], input[type="time"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background-color: #00f2fe; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #00d9e9; }
        
        .nowBtn { background-color: #999 !important; }
        .nowBtn:hover { background-color: #777 !important; }
        
        .result { margin-top: 25px; padding: 20px; background: #fffdfb; border: 1px solid #d3c2b2; text-align: left; border-radius: 8px; display: none; }
        .result.show { display: block; }
        .result h3 { margin-top: 0; color: #008ba3; border-bottom: 2px solid #008ba3; padding-bottom: 8px; }
        .info-box { background: #e0f7fa; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 15px; border-left: 4px solid #00bcd4; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #b2ebf2; color: #333; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌙 음력 변환</h1>
        <a href="index.html" class="home-btn">← 돌아가기</a>
    </div>
    
    <label for="solarDate">양력 날짜 선택</label>
    <input type="date" id="solarDate" value="2026-06-25">

    <label for="solarTime">질문 시간 입력</label>
    <input type="time" id="solarTime" value="15:24">

    <button class="nowBtn" onclick="setNow()">현재시간 불러오기</button>
    <button onclick="calculateTraditionalMaehwa()">전통 음력 괘 도출하기</button>

    <div class="result" id="resultBox">
        <h3>🔮 전통 방식 작괘 결과</h3>
        
        <div class="info-box" id="lunarInfo"></div>
        <div id="calcProcess" style="font-size: 14px; color: #555; line-height: 1.6;"></div>
        
        <table>
            <tr>
                <th>구분</th>
                <th>상괘 (위)</th>
                <th>하괘 (아래)</th>
                <th>동효 (움직이는 효)</th>
            </tr>
            <tr>
                <td><b>결과</b></td>
                <td id="resUpper"></td>
                <td id="resLower"></td>
                <td id="resDong" class="highlight"></td>
            </tr>
        </table>
    </div>
</div>

<script>
const gwaeNames = { 1: "건(하늘)", 2: "태(연못)", 3: "리(불)", 4: "진(천둥)", 5: "손(바람)", 6: "감(물)", 7: "간(산)", 8: "곤(땅)" };
const jijiNames = ["자(1)", "축(2)", "인(3)", "묘(4)", "진(5)", "사(6)", "오(7)", "미(8)", "신(9)", "유(10)", "술(11)", "해(12)"];

function setNow(){
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth()+1).padStart(2,"0");
    const day = String(now.getDate()).padStart(2,"0");
    const hour = String(now.getHours()).padStart(2,"0");
    const minute = String(now.getMinutes()).padStart(2,"0");

    document.getElementById("solarDate").value = `${year}-${month}-${day}`;
    document.getElementById("solarTime").value = `${hour}:${minute}`;
}

function convertSolarToLunar(dateStr) {
    const sDate = new Date(dateStr);
    const year = sDate.getFullYear();
    const month = sDate.getMonth() + 1;
    const day = sDate.getDate();

    const baseDate = new Date("1970-01-01");
    const diffDays = Math.floor((sDate - baseDate) / (1000 * 60 * 60 * 24));
    
    let totalLunarDays = diffDays + 24 + (11 * 29.53059) + (1969 * 354.367);
    let remDays = totalLunarDays % 354.367;
    
    let lunarMonth = Math.floor(remDays / 29.53059) + 1;
    let lunarDay = Math.floor(remDays % 29.53059) + 1;

    let finalYearJiji = ((year - 2026) % 12 + 7); 
    if(finalYearJiji <= 0) finalYearJiji += 12;
    
    let finalMonth = lunarMonth;
    let finalDay = lunarDay;

    if (year === 2026) {
        if (month === 5) {
            finalMonth = 4;
            finalDay = day - 15 + 1;
            if (finalDay <= 0) { finalMonth = 3; finalDay += 30; }
        } else if (month === 6) {
            finalMonth = 5;
            finalDay = day - 14;
        } else if (month === 7) {
            finalMonth = 6;
            finalDay = day - 13;
        }
    }

    return {
        yearNum: finalYearJiji,
        month: finalMonth,
        day: finalDay,
        yearName: jijiNames[finalYearJiji - 1]
    };
}

function getTimeJijiNum(timeStr) {
    const [hourStr] = timeStr.split(':');
    const hour = parseInt(hourStr);
    
    if (hour >= 23 || hour < 1) return 1;
    if (hour >= 1 && hour < 3) return 2;
    if (hour >= 3 && hour < 5) return 3;
    if (hour >= 5 && hour < 7) return 4;
    if (hour >= 7 && hour < 9) return 5;
    if (hour >= 9 && hour < 11) return 6;
    if (hour >= 11 && hour < 13) return 7;
    if (hour >= 13 && hour < 15) return 8;
    if (hour >= 15 && hour < 17) return 9;
    if (hour >= 17 && hour < 19) return 10;
    if (hour >= 19 && hour < 21) return 11;
    return 12;
}

function calculateTraditionalMaehwa() {
    const dateVal = document.getElementById('solarDate').value;
    const timeVal = document.getElementById('solarTime').value;

    if(!dateVal || !timeVal){
        alert("날짜와 시간을 입력해 주세요.");
        return;
    }

    const lunar = convertSolarToLunar(dateVal);
    const h = getTimeJijiNum(timeVal);

    const y = lunar.yearNum;
    const m = lunar.month;
    const d = lunar.day;

    const upperSum = y + m + d;
    let upperGwae = upperSum % 8;
    if (upperGwae === 0) upperGwae = 8;

    const lowerSum = upperSum + h;
    let lowerGwae = lowerSum % 8;
    if (lowerGwae === 0) lowerGwae = 8;

    let dongHyo = lowerSum % 6;
    if (dongHyo === 0) dongHyo = 6;

    document.getElementById('lunarInfo').innerHTML = `
        <b>전통 음력 변환:</b> [${lunar.yearName}년] 음력 <b>${m}월 ${d}일</b> / <b>${jijiNames[h-1]}시</b>
    `;

    document.getElementById('calcProcess').innerHTML = `
        <p>• <b>상괘 공식:</b> 년지(${y}) + 음력월(${m}) + 음력일(${d}) = ${upperSum} → 8로 나눈 나머지 [<b>${upperGwae}</b>]</p>
        <p>• <b>하괘 공식:</b> 상괘합(${upperSum}) + 시지(${h}) = ${lowerSum} → 8로 나눈 나머지 [<b>${lowerGwae}</b>]</p>
        <p>• <b>동효 공식:</b> 총합(${lowerSum}) ÷ 6 → 나머지 [<b>${dongHyo}효동</b>]</p>
    `;

    document.getElementById('resUpper').innerText = gwaeNames[upperGwae];
    document.getElementById('resLower').innerText = gwaeNames[lowerGwae];
    document.getElementById('resDong').innerText = dongHyo + "효";

    document.getElementById('resultBox').classList.add("show");
}

setNow();

</script>

</body>
</html>
