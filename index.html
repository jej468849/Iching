<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매화역수 작괘기 - 메인</title>
<style>
body{
    font-family: "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    max-width: 600px;
    background: white;
    padding: 50px 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
}

h1{
    font-size: 42px;
    margin: 0 0 10px 0;
    color: #333;
}

.subtitle{
    font-size: 16px;
    color: #666;
    margin-bottom: 40px;
    line-height: 1.6;
}

.buttons-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card-btn{
    padding: 40px 20px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: white;
}

.card-btn:hover{
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.solar-btn{
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

.lunar-btn{
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}

.sichomjum-btn{
    background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    grid-column: 1 / -1;
}

.icon{
    font-size: 40px;
}

.description{
    font-size: 13px;
    opacity: 0.9;
}

@media (max-width: 600px){
    .container{
        padding: 30px 20px;
    }
    
    h1{
        font-size: 32px;
    }
    
    .buttons-grid{
        grid-template-columns: 1fr;
    }
    
    .card-btn{
        padding: 30px 15px;
    }
    
    .sichomjum-btn{
        grid-column: 1;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🌸 매화역수</h1>
    <div class="subtitle">
        전통 역학의 지혜로 하늘의 뜻을 묻다<br>
        어떤 방식으로 작괘하시겠습니까?
    </div>

    <div class="buttons-grid">
        <a href="solar.html" class="card-btn solar-btn">
            <div class="icon">☀️</div>
            <div>양력 기본</div>
            <div class="description">서기 날짜로 작괘</div>
        </a>
        
        <a href="lunar.html" class="card-btn lunar-btn">
            <div class="icon">🌙</div>
            <div>음력 변환</div>
            <div class="description">음력 달력으로 작괘</div>
        </a>

        <a href="sichomjum.html" class="card-btn sichomjum-btn">
            <div class="icon">🎲</div>
            <div>시초점 작괘</div>
            <div class="description">주사위로 효를 뽑다</div>
        </a>
    </div>
</div>

</body>
</html>
